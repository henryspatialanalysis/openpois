name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths: ['site/**', 'src/**', 'docs/**', 'scripts/**', '.github/workflows/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: site

      - name: Copy DuckDB WASM files to public
        run: |
          cp node_modules/@duckdb/duckdb-wasm/dist/duckdb-browser-eh.worker.js public/
          cp node_modules/@duckdb/duckdb-wasm/dist/duckdb-eh.wasm public/
        working-directory: site

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r docs/requirements.txt pandas

      - name: Build taxonomy page
        run: python scripts/build_taxonomy.py

      - name: Build
        run: npm run build
        working-directory: site
        env:
          VITE_STADIA_API_KEY: ${{ secrets.VITE_STADIA_API_KEY }}

      - name: Build Sphinx docs
        run: make html
        working-directory: docs

      - name: Copy Sphinx docs into site dist
        run: cp -r docs/_build/html site/dist/docs

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
