# Versioned directories (used with config.get_dir_path())
versions:
  osm_data: "20260313"
  model_output: "20260315_constant"
  snapshot_osm: "20260313"
  snapshot_overture: "20260313"
  snapshot_foursquare: "20260313"
  aws: "20260313"
  conflation: "20260316"

# Settings for downloading data
download:
  general:
    timeout: 1_000
    bbox:
      xmin: -125.0
      ymin: 24.5
      xmax: -66.9
      ymax: 49.4
  osm:
    start_date: 2016-01-01
    end_date: 2025-12-31
    date_interval_days: 7
    pbf_url: "https://download.geofabrik.de/north-america/us-latest.osm.pbf"
    overwrite_download: false
    overwrite_filter: false
    source_label: "osm"
    keep_all_keys: false
    chunk_size: 100_000
    max_area_nodes: 1_000
    verbose: true
    filter_keys: ['shop', 'healthcare', 'leisure', 'amenity']
    extract_keys: [
      'addr:city','addr:country','addr:housename','addr:housenumber','addr:postcode',
      'addr:state','addr:street','addr:unit','amenity','atm','bar','bicycle',
      'bicycle_parking','brand','brand:wikidata','building','check_date',
      'check_date:opening_hours','cuisine','description','education','email',
      'emergency','fountain','geometry','healthcare','healthcare:speciality','historic',
      'image','landuse','leisure','name','nursery','official_name','old_name',
      'opening_date','opening_hours','osm_id','osm_type','phone','playground','preschool',
      'recycling_type','self_service','service','shelter','shop','short_name',
      'social_facility','social_facility:for','source','sport','tourism','type','url',
      'website','wikidata','wikipedia'
    ]
  overture:
    release_date: null  # null = auto-detect latest
    s3_bucket: "overturemaps-us-west-2"
    s3_region: "us-west-2"
    taxonomy_l0_categories:
      - food_and_drink
      - shopping
      - arts_and_entertainment
      - sports_and_recreation
      - health_care
  foursquare:
    release_date: null  # null = auto-detect latest
    catalog_uri: "https://catalog.h3-hub.foursquare.com/iceberg"
    catalog_warehouse: "places"
    catalog_namespace: "datasets"
    places_table: "places_os"
    categories_table: "categories_os"
    token_env_var: "FSQ_PORTAL_TOKEN"
    l1_category_names:
      - "Dining and Drinking"
      - "Retail"
      - "Arts and Entertainment"
      - "Sports and Recreation"
      - "Health and Medicine"

# Settings for OSM exploratory data analysis
osm_data:
  tag_key: name
  top_n_types: 10
  timestamp_cols:
    - obs_timestamp
    - last_obs_timestamp
    - last_tag_timestamp
  apply_model:
    model_stub: '20260315'

# Settings for exploratory/models/pytorch_simple.py
osm_turnover_model:
  model_type: constant
  tag_key: name
  var_prior: [-1.0, 5.0]
  group_key: null
  group_values: null
  min_value_count: 5
  n_draws: 250
  save_full_model: true

# Directory definitions (used with config.get_dir_path())
directories:
  osm_data:
    versioned: true
    path: ~/data/openpois/osm_data
    files:
      osm_changes: osm_changes.csv
      osm_versions: osm_versions.csv
      osm_elements: osm_elements.csv
      osm_failed_elements: osm_failed_elements.csv
  model_output:
    versioned: true
    path: ~/data/openpois/osm_turnover_model
    files:
      fitted_params: fitted_params.csv
      param_draws: param_draws.csv
      predictions: predictions.csv
      fitted_model: fitted_model.pt
  snapshot_foursquare:
    versioned: true
    path: ~/data/openpois/snapshots/foursquare
    files:
      snapshot: foursquare_snapshot.parquet
      partitioned: foursquare_snapshot_partitioned
  snapshot_osm:
    versioned: true
    path: ~/data/openpois/snapshots/osm
    files:
      raw_pbf: us-latest.osm.pbf
      filtered_pbf: us-pois.osm.pbf
      snapshot: osm_snapshot.parquet
      rated_snapshot: osm_snapshot_rated.parquet
      partitioned: osm_snapshot_partitioned
      pmtiles: osm_snapshot.pmtiles
  snapshot_overture:
    versioned: true
    path: ~/data/openpois/snapshots/overture
    files:
      snapshot: overture_snapshot.parquet
  conflation:
    versioned: true
    path: ~/data/openpois/conflation
    files:
      conflated: conflated.parquet
      match_diagnostics: match_diagnostics.parquet
      partitioned: conflated_partitioned
      summary_by_label: summary_by_label.csv
  testing:
    versioned: false
    path: ~/data/openpois/testing
    files:
      osm_snippet: osm_snippet.csv
      overture_snippet: overture_snippet.csv
      foursquare_snippet: foursquare_snippet.csv

# Settings for POI conflation
conflation:
  overture_confidence_weight: 0.7
  min_match_score: 0.50
  max_radius_m: 200
  default_radius_m: 100
  distance_weight: 0.0
  name_weight: 0.50
  type_weight: 0.30
  identifier_weight: 0.20
  chunk_size: 500_000
  test_bbox:
    xmin: -122.45
    ymin: 47.50
    xmax: -122.25
    ymax: 47.70

# Settings for uploading snapshots to S3
upload:
  s3_region: "us-west-2"
  s3_bucket: "openpois-public"
  s3_prefix_osm: "snapshots/osm"
  s3_prefix_conflation: "snapshots/conflated"
  latest_url_osm: "https://openpois-public.s3.us-west-2.amazonaws.com/snapshots/osm/20260313/osm_snapshot_partitioned/"
  latest_url_conflation: "https://openpois-public.s3.us-west-2.amazonaws.com/snapshots/conflated/20260313/conflated_partitioned/"
  geohash_precision_partition: 4  # ~39 km x 20 km cells; ~1,000–3,000 cells over CONUS
  geohash_precision_sort: 6       # ~0.6 km x 1.2 km; fine-grained sort within each partition
  pmtiles:
    min_zoom: 14
    max_zoom: 16
